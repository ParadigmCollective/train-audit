; io.unobserve(e.target); } });\n    }, { threshold: 0.6 });\n    // Leave the real value in place; only reset to 0 at the moment a node animates.\n    // If IO never fires (offscreen iframe, throttled), the true number stays visible instead of 0.\n    nodes.forEach(n=>{ if(this.inView(n)){ start(n); } else { io.observe(n); } });\n    this._obs.push(io);\n  }\n  animateCount(node, target){\n    const dur=1100, start=performance.now(), ease=t=>1-Math.pow(1-t,3);\n    const tick=(now)=>{\n      const p=Math.min(1,(now-start)/dur);\n      node.textContent=String(Math.round(ease(p)*target));\n      if(p<1){ this._raf.push(requestAnimationFrame(tick)); } else { node.textContent=String(target); }\n    };\n    this._raf.push(requestAnimationFrame(tick));\n  }\n\n  setupReveal(){\n    const nodes = Array.from(document.querySelectorAll('[data-reveal]'));\n    if(this.reduce){ nodes.forEach(n=>n.classList.add('qf-in')); return; }\n    const reveal = (n)=> n.classList.add('qf-in');\n    // Reveal anything already on screen at mount\n    nodes.forEach(n=>{ if(this.inView(n)) reveal(n); });\n    const io = new IntersectionObserver((entries)=>{\n      entries.forEach(e=>{ if(e.isIntersecting){ reveal(e.target); io.unobserve(e.target); } });\n    }, { threshold: 0.14, rootMargin:'0px 0px -8% 0px' });\n    nodes.forEach(n=>{ if(!n.classList.contains('qf-in')) io.observe(n); });\n    this._obs.push(io);\n    // Safety net: never leave content hidden if IO fails to fire\n    this._fallbacks.push(setTimeout(()=>{ nodes.forEach(reveal); }, 1100));\n  }\n\n  setupScroll(){\n    const ids = this.navData.map(n=>n.id);\n    this._scrollHandler = ()=>{\n      const doc=document.documentElement;\n      const max=doc.scrollHeight-doc.clientHeight;\n      const pct=max>0 ? (window.pageYOffset/max)*100 : 0;\n      const prog=this._refs && this._refs.progressRef;\n      if(prog) prog.style.width=pct.toFixed(2)+'%';\n      let active=ids[0];\n      for(const id of ids){ const el=document.getElementById(id); if(el && el.getBoundingClientRect().top<=130) active=id; }\n      document.querySelectorAll('[data-navlink]').forEach(a=>{\n        const on=a.getAttribute('data-navlink')===active;\n        a.style.color=on?'#1F4E38':'#4B5563';\n        a.style.background=on?'rgba(177,223,86,0.2)':'transparent';\n      });\n    };\n    window.addEventListener('scroll', this._scrollHandler, { passive:true });\n    this._scrollHandler();\n  }\n\n  setupGauges(){\n    if(this.reduce) return;\n    const rings = Array.from(document.querySelectorAll('[data-ring]'));\n    const io = new IntersectionObserver((entries)=>{\n      entries.forEach(e=>{\n        if(e.isIntersecting && !e.target._done){\n          e.target._done=true;\n          const circ=parseFloat(e.target.getAttribute('data-circ'));\n          const off=parseFloat(e.target.getAttribute('data-off'));\n          e.target.style.transition='none';\n          e.target.style.strokeDashoffset=circ;\n          void e.target.getBoundingClientRect();\n          e.target.style.transition='stroke-dashoffset 1.2s cubic-bezier(.22,1,.36,1)';\n          requestAnimationFrame(()=>{ e.target.style.strokeDashoffset=off; });\n          io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.4 });\n    rings.forEach(r=>io.observe(r));\n    this._obs.push(io);\n  }\n\n  setupScatter(){\n    if(this.reduce){ this.setState({ scatterIn:true }); return; }\n    const plot=document.querySelector('[data-plot]');\n    if(!plot){ this.setState({ scatterIn:true }); return; }\n    if(this.inView(plot)){ this.setState({ scatterIn:true }); return; }\n    const io=new IntersectionObserver((entries)=>{\n      entries.forEach(e=>{ if(e.isIntersecting){ this.setState({ scatterIn:true }); io.disconnect(); } });\n    }, { threshold: 0.2 });\n    io.observe(plot);\n    this._obs.push(io);\n    // Safety net: never leave points permanently invisible\n    this._fallbacks.push(setTimeout(()=>{ if(!this.state.scatterIn) this.setState({ scatterIn:true }); }, 1500));\n  }\n\n  buildFindingCard(f){\n    const sc=this.sevColors[f.sev], jt=this.journeyTag(f.journey);\n    const open=this.state.expandedFinding===f.id;\n    return {\n      id:f.id, title:f.title, detail:f.detail, where:f.where,\n      sevLabel:f.sev, sevBg:sc.bg, sevFg:sc.fg, sevDot:sc.dot,\n      journeyLabel:jt.label, journeyBg:jt.bg, journeyFg:jt.fg,\n      typeTags:f.types.map(t=>({ label:this.typeMeta[t].label, bg:this.typeMeta[t].bg, fg:this.typeMeta[t].fg })),\n      isOpen:open, chevron: open?'rotate(180deg)':'rotate(0deg)',\n      cardBg: open?'#FFFFFF':'#FCFCF8',\n      onToggle: ()=> this.setState(s=>({ expandedFinding: s.expandedFinding===f.id?null:f.id })),\n    };\n  }\n\n  renderVals(){\n    const S=this.state;\n    const nav=this.navData.map(n=>({ id:n.id, label:n.label, href:'#'+n.id, onClick:(e)=>{ e.preventDefault(); this.scrollToId(n.id); } }));\n\n    // findings\n    const counts={ all:this.findings.length, Critical:0, High:0, Medium:0, Low:0 };\n    this.findings.forEach(f=>counts[f.sev]++);\n    const chipDefs=[\n      { key:'all', label:'All findings', color:'#1F4E38', dot:'#38731A' },\n      { key:'Critical', label:'Critical', color:this.sevColors.Critical.fg, dot:this.sevColors.Critical.dot },\n      { key:'High', label:'High', color:this.sevColors.High.fg, dot:this.sevColors.High.dot },\n      { key:'Medium', label:'Medium', color:this.sevColors.Medium.fg, dot:this.sevColors.Medium.dot },\n      { key:'Low', label:'Low', color:this.sevColors.Low.fg, dot:this.sevColors.Low.dot },\n    ];\n    const severityChips=chipDefs.map(c=>{\n      const active=S.severityFilter===c.key;\n      return { key:c.key, label:c.label, count:counts[c.key], dot:c.dot, active,\n        bg:active?'#1F4E38':'#FFFFFF', fg:active?'#FFFFFF':c.color, border:active?'#1F4E38':'rgba(31,78,56,0.16)',\n        countBg:active?'rgba(255,255,255,0.18)':'rgba(31,78,56,0.06)', countFg:active?'#FFFFFF':'#4B5563',\n        onClick:()=>this.setState({ severityFilter:c.key, expandedFinding:null }) };\n    });\n    const filtered=this.findings\n      .filter(f=>S.severityFilter==='all'||f.sev===S.severityFilter)\n      .sort((a,b)=>this.sevRank[a.sev]-this.sevRank[b.sev]||a.id.localeCompare(b.id));\n    const filteredFindings=filtered.map(f=>this.buildFindingCard(f));\n    const filterSummary=S.severityFilter==='all'\n      ? 'Showing all '+this.findings.length+' findings, ordered by severity.'\n      : 'Showing '+filtered.length+' '+S.severityFilter.toLowerCase()+(filtered.length===1?' finding.':' findings.');\n\n    // state map\n    const journeyTabs=['client','member'].map(k=>({ key:k, label:this.journeys[k].label, active:S.activeJourney===k,\n      bg:S.activeJourney===k?'#1F4E38':'transparent', fg:S.activeJourney===k?'#FFFFFF':'#4B5563',\n      onClick:()=>this.setState({ activeJourney:k, expandedStep:null }) }));\n    const jd=this.journeys[S.activeJourney];\n    const jcounts={ working:0, partial:0, broken:0 };\n    jd.steps.forEach(s=>jcounts[s.status]++);\n    const steps=jd.steps.map((st,i)=>{\n      const sc=this.statusColors[st.status];\n      const open=S.expandedStep===(S.activeJourney+'-'+i);\n      return { num:String(i+1).padStart(2,'0'), label:st.label, summary:st.summary,\n        statusLabel:sc.label, statusBg:sc.bg, statusFg:sc.fg, statusDot:sc.dot,\n        isOpen:open, chevron:open?'rotate(180deg)':'rotate(0deg)',\n        findingChips:st.fids.map(id=>{ const f=this.findingById(id); const c=this.sevColors[f.sev]; return { id:f.id, title:f.title, fg:c.fg, bg:c.bg }; }),\n        positiveChips:st.pids.map(id=>({ id, text:this.positives.find(p=>p.id===id).text })),\n        onToggle:()=>this.setState(s=>({ expandedStep:s.expandedStep===(S.activeJourney+'-'+i)?null:(S.activeJourney+'-'+i) })) };\n    });\n\n    // matrix\n    const mkBtn=(active)=>({ bg:active?'#1F4E38':'#FFFFFF', fg:active?'#FFFFFF':'#1F4E38', border:active?'#1F4E38':'rgba(31,78,56,0.16)' });\n    const mxJChips=[{key:'all',label:'All journeys'},{key:'Client',label:'Client'},{key:'Member',label:'Member'}]\n      .map(c=>({ ...c, ...mkBtn(S.mxJourney===c.key), onClick:()=>this.setState({ mxJourney:c.key }) }));\n    const mxSChips=[{key:'all',label:'All severities'},{key:'Critical',label:'Critical'},{key:'High',label:'High'},{key:'Medium',label:'Medium'},{key:'Low',label:'Low'}]\n      .map(c=>({ ...c, ...mkBtn(S.mxSeverity===c.key), dot:c.key==='all'?'#38731A':this.sevColors[c.key].dot, onClick:()=>this.setState({ mxSeverity:c.key }) }));\n    const points=this.matrix.map((m,idx)=>{\n      const f=this.findingById(m.id); const sc=this.sevColors[f.sev];\n      const jmatch=S.mxJourney==='all'||f.journey===S.mxJourney||f.journey==='Both';\n      const smatch=S.mxSeverity==='all'||f.sev===S.mxSeverity;\n      const dim=!(jmatch&&smatch);\n      const size=18+m.impact*1.7;\n      const left=8+(m.effort-1)/9*84;\n      const top=8+(10-m.impact)/9*84;\n      const isHover=S.hoverPoint===m.id;\n      const shown=S.scatterIn;\n      return { id:m.id, dimFlag:dim?'1':'0',\n        pointStyle:{ position:'absolute', left:left.toFixed(2)+'%', top:top.toFixed(2)+'%', width:size+'px', height:size+'px',\n          borderRadius:'50%', background:sc.dot, border:'2px solid '+(isHover?'#1F4E38':'#FFFFFF'),\n          boxShadow:isHover?'0 6px 18px rgba(16,60,10,0.3)':'0 2px 6px rgba(16,60,10,0.18)',\n          opacity: shown?(dim?0.16:1):0, transform:'translate(-50%,-50%) scale('+(isHover?1.25:(shown?1:0.4))+')',\n          transition:'opacity .5s ease, transform .45s cubic-bezier(.22,1,.36,1), box-shadow .2s, border-color .2s',\n          transitionDelay: shown?(idx*30)+'ms':'0ms', cursor:'pointer', zIndex:isHover?5:2 },\n        onEnter:()=>this.setState({ hoverPoint:m.id }), onLeave:()=>this.setState({ hoverPoint:null }) };\n    });\n    let hover=null;\n    if(S.hoverPoint){\n      const m=this.matrix.find(x=>x.id===S.hoverPoint); const f=this.findingById(m.id); const sc=this.sevColors[f.sev];\n      const left=8+(m.effort-1)/9*84; const top=8+(10-m.impact)/9*84;\n      hover={ id:m.id, title:f.title, sevDot:sc.dot, impact:m.impact, effort:m.effort, quad:m.quad,\n        boxStyle:{ position:'absolute', left:Math.min(left,68).toFixed(2)+'%', top:(top>50?top-3:top+4).toFixed(2)+'%',\n          transform:top>50?'translateY(-100%)':'translateY(0)', zIndex:10, pointerEvents:'none' } };\n    }\n\n    // scorecard\n    const r=52, circ=2*Math.PI*r;\n    const cats=this.scorecard.map((c,i)=>{\n      const rd=this.ratingDark[c.rating];\n      const off=circ*(1-c.score/100);\n      const open=S.expandedCat===i;\n      return { cat:c.cat, rating:c.rating, ratingColor:rd.c, pillBg:rd.pill, score:c.score, by:c.by,\n        circ:circ.toFixed(2), off:off.toFixed(2),\n        ringStyle:{ strokeDasharray:circ.toFixed(2), strokeDashoffset:off.toFixed(2), transition:'stroke-dashoffset 1.2s cubic-bezier(.22,1,.36,1)' },\n        isOpen:open, chevron:open?'rotate(180deg)':'rotate(0deg)',\n        onToggle:()=>this.setState(s=>({ expandedCat:s.expandedCat===i?null:i })) };\n    });\n    const tally={ Green:0, Yellow:0, Red:0 };\n    this.scorecard.forEach(c=>tally[c.rating]++);\n\n    // roadmap\n    const phaseTabs=this.phases.map((p,i)=>{\n      const active=S.activePhase===i;\n      return { n:p.n, name:p.name, kind:p.kind,\n        bg:active?'#1F4E38':'#FFFFFF', border:active?'#1F4E38':'rgba(31,78,56,0.14)',\n        numColor:active?'#B1DF56':'#38731A', nameColor:active?'#FFFFFF':'#1F4E38', kindColor:active?'rgba(255,255,255,0.6)':'#9AA0A6',\n        onClick:()=>this.setState({ activePhase:i }) };\n    });\n    const ph=this.phases[S.activePhase];\n    const phaseData={ n:ph.n, name:ph.name, kind:ph.kind, intro:ph.intro, outcome:ph.outcome, count:ph.fixes.length,\n      fixes:ph.fixes.map(id=>{ const f=this.findingById(id); const sc=this.sevColors[f.sev]; return { id:f.id, title:f.title, dot:sc.dot, sevLabel:f.sev, sevFg:sc.fg }; }) };\n\n    // open items\n    const openCards=this.openItems.map(o=>{ const t=this.tagColors[o.tag]||{ bg:'#ECEFEF', fg:'#475569' }; return { item:o.item, why:o.why, tag:o.tag, tagBg:t.bg, tagFg:t.fg }; });\n\n    return {\n      navItems:nav,\n      progressRef:(el)=>{ this._refs=this._refs||{}; this._refs.progressRef=el; },\n      scrollTop:()=>window.scrollTo({ top:0, behavior:this.reduce?'auto':'smooth' }),\n      severityChips, filteredFindings, filterSummary,\n      journeyTabs, journeyBlurb:jd.blurb, steps,\n      workingCount:jcounts.working, partialCount:jcounts.partial, brokenCount:jcounts.broken,\n      mxJChips, mxSChips, points, hover,\n      cats, greenCount:tally.Green, yellowCount:tally.Yellow, redCount:tally.Red,\n      phaseTabs, phaseData, openCards,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
