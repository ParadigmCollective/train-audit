document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

   <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ============ COVER ============ -->\n  <header id=\"top\" data-screen-label=\"Cover\" data-label=\"Cover\" style=\"position:relative;background:#F7F5E8;color:#1F4E38;overflow:hidden;min-height:90vh;display:flex;flex-direction:column;\">\n    <div style=\"position:relative;z-index:2;max-width:1200px;width:100%;margin:0 auto;padding:36px 24px 0;display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n      <img src=\"c8d718f8-b6aa-4323-a929-6aea46110f92\" alt=\"QuikFire\" style=\"height:46px;width:auto;display:block;\">\n      <div style=\"text-align:right;font-family:'Poppins';font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#4B5563;\">Prepared for Trust In Train<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:relative;z-index:2;flex:1;max-width:1200px;width:100%;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;justify-content:center;\">\n      <div style=\"font-family:'Poppins';font-size:13px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:#38731A;margin-bottom:20px;\">GoHighLevel account audit<\u002Fdiv>\n      <h1 style=\"font-family:'Poppins';font-weight:700;font-size:clamp(46px,7.2vw,92px);line-height:1.02;letter-spacing:-0.02em;margin:0;max-width:15ch;color:#1F4E38;text-wrap:balance;\">Train system audit<\u002Fh1>\n      <p style=\"font-family:'Jost';font-size:clamp(17px,1.5vw,20px);line-height:1.6;color:#2D2D2D;max-width:60ch;margin:24px 0 0;\">A full walk of both intake journeys inside your GoHighLevel account. What works, what is broken, and the coordinated repair that puts the system right. Read it as one fix, not a pile of tickets.<\u002Fp>\n\n      <div style=\"margin-top:52px;display:flex;flex-wrap:wrap;gap:18px 52px;align-items:flex-end;\">\n        <div>\n          <div style=\"font-family:'Poppins';font-weight:800;font-size:clamp(44px,5vw,64px);line-height:1;color:#1F4E38;letter-spacing:-0.02em;\"><span data-countup=\"2\">2<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Poppins';font-size:13px;font-weight:600;letter-spacing:0.04em;color:#4B5563;margin-top:8px;text-transform:uppercase;\">Journeys audited<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:1px;align-self:stretch;background:rgba(31,78,56,0.16);\"><\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Poppins';font-weight:800;font-size:clamp(44px,5vw,64px);line-height:1;color:#1F4E38;letter-spacing:-0.02em;\"><span data-countup=\"21\">21<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Poppins';font-size:13px;font-weight:600;letter-spacing:0.04em;color:#4B5563;margin-top:8px;text-transform:uppercase;\">Findings logged<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:1px;align-self:stretch;background:rgba(31,78,56,0.16);\"><\u002Fdiv>\n        <div style=\"position:relative;\">\n          <div style=\"font-family:'Poppins';font-weight:800;font-size:clamp(44px,5vw,64px);line-height:1;color:#38731A;letter-spacing:-0.02em;\"><span data-countup=\"6\">6<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:7px;margin-top:8px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:#B1DF56;\"><\u002Fspan><span style=\"font-family:'Poppins';font-size:13px;font-weight:600;letter-spacing:0.04em;color:#4B5563;text-transform:uppercase;\">Working as intended<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:relative;z-index:2;max-width:1200px;width:100%;margin:0 auto;padding:0 24px 34px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;\">\n      <div style=\"font-family:'Jost';font-size:14px;color:#4B5563;\">Two locations, McLean and Vienna. Audit run by Ryan and Aleia.<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:9px;font-family:'Poppins';font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#4B5563;\">\n        <span style=\"width:7px;height:7px;border-radius:50%;background:#B1DF56;\"><\u002Fspan>Scroll to begin\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ EXECUTIVE SUMMARY ============ -->\n  <section id=\"summary\" data-screen-label=\"Executive summary\" data-label=\"Executive summary\" style=\"max-width:1200px;margin:0 auto;padding:96px 24px 56px;\">\n    <div class=\"qf-reveal\" data-reveal=\"\" style=\"margin-bottom:34px;\">\n      <div style=\"font-family:'Poppins';font-size:13px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#38731A;margin-bottom:14px;\">The 20 second read<\u002Fdiv>\n      <h2 style=\"font-family:'Poppins';font-weight:700;font-size:clamp(30px,4vw,44px);line-height:1.1;letter-spacing:-0.015em;margin:0;max-width:20ch;color:#1F4E38;text-wrap:balance;\">The spine works. The edges are where members and leads fall through.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"qf-bento\" style=\"display:grid;grid-template-columns:repeat(12,1fr);gap:18px;\">\n      <!-- Headline finding -->\n      <div class=\"qf-reveal\" data-reveal=\"\" style=\"grid-column:span 7;background:#1F4E38;color:#FFFFFF;border-radius:25px;padding:34px 36px;min-height:250px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 16px 40px rgba(16,60,10,0.12);\">\n        <div>\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;\">\n            <span style=\"display:inline-flex;align-items:center;gap:6px;background:#FF5C00;color:#fff;font-family:'Poppins';font-size:11px;font-weight:600;letter-spacing:0.04em;padding:6px 12px;border-radius:9999px;text-transform:uppercase;\">Highest impact<\u002Fspan>\n            <span style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.82);font-family:'Poppins';font-size:11px;font-weight:500;padding:6px 12px;border-radius:9999px;border:1px solid rgba(255,255,255,0.18);\">Both journeys<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Poppins';font-weight:600;font-size:25px;line-height:1.25;margin:0 0 12px;color:#FFFFFF;\">Skipped user assignment stops internal notifications and routing.<\u002Fh3>\n          <p style=\"font-family:'Jost';font-size:15.5px;line-height:1.6;color:rgba(255,255,255,0.78);margin:0;max-width:54ch;\">Across multiple workflows the assign-to-user step appears skipped, and the internal notifications that depend on it stop too. Owners are not alerted, and contacts are not handed to the right person. It reads as a standard configuration fix.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:14px 26px;margin-top:24px;flex-wrap:wrap;\">\n          <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#B1DF56;flex:none;\"><\u002Fspan><span style=\"font-family:'Jost';font-size:14px;color:rgba(255,255,255,0.85);\">Owner notifications restored<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#B1DF56;flex:none;\"><\u002Fspan><span style=\"font-family:'Jost';font-size:14px;color:rgba(255,255,255,0.85);\">Leads routed to the right person<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"grid-column:span 5;display:grid;grid-template-rows:auto auto;gap:18px;\">\n        <div class=\"qf-reveal\" data-reveal=\"\" style=\"background:#FFFFFF;border:1px solid rgba(31,78,56,0.12);border-radius:25px;padding:28px;box-shadow:0 2px 8px rgba(16,60,10,0.06);\">\n          <div style=\"font-family:'Poppins';font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#4B5563;margin-bottom:16px;\">Severity spread<\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-end;gap:20px;\">\n            <div><div style=\"font-family:'Poppins';font-weight:800;font-size:38px;line-height:1;color:#C0341A;\">2<\u002Fdiv><div style=\"font-family:'Poppins';font-size:12px;color:#4B5563;margin-top:6px;font-weight:500;\">Critical<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-family:'Poppins';font-weight:800;font-size:38px;line-height:1;color:#B07B14;\">8<\u002Fdiv><div style=\"font-family:'Poppins';font-size:12px;color:#4B5563;margin-top:6px;font-weight:500;\">High<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-family:'Poppins';font-weight:800;font-size:38px;line-height:1;color:#475569;\">9<\u002Fdiv><div style=\"font-family:'Poppins';font-size:12px;color:#4B5563;margin-top:6px;font-weight:500;\">Medium<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-family:'Poppins';font-weight:800;font-size:38px;line-height:1;color:#9AA0A6;\">2<\u002Fdiv><div style=\"font-family:'Poppins';font-size:12px;color:#4B5563;margin-top:6px;font-weight:500;\">Low<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"qf-reveal\" data-reveal=\"\" style=\"background:#F7F5E8;border:1px solid rgba(31,78,56,0.1);border-radius:25px;padding:28px;\">\n          <div style=\"font-family:'Poppins';font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#4B5563;margin-bottom:14px;\">What the repair splits into<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:11px;\">\n            <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#38731A;flex:none;\"><\u002Fspan><span style=\"font-family:'Jost';font-size:14.5px;color:#2D2D2D;\"><strong style=\"font-family:'Poppins';font-weight:600;color:#1F4E38;\">15 standard config fixes<\u002Fstrong> inside GoHighLevel<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#475569;flex:none;\"><\u002Fspan><span style=\"font-family:'Jost';font-size:14.5px;color:#2D2D2D;\"><strong style=\"font-family:'Poppins';font-weight:600;color:#1F4E38;\">4 custom builds<\u002Fstrong> for the portal and credits<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:11px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#D69E2E;flex:none;\"><\u002Fspan><span style=\"font-family:'Jost';font-size:14.5px;color:#2D2D2D;\"><strong style=\"font-family:'Poppins';font-weight:600;color:#1F4E38;\">4 items to confirm<\u002Fstrong> with JP before fixing<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"qf-reveal\" data-reveal=\"\" style=\"grid-column:span 4;background:#F7F5E8;border:1px solid rgba(31,78,56,0.1);border-radius:25px;padding:26px;\">\n        <div style=\"font-family:'Poppins';font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#38731A;margin-bottom:12px;\">What is solid<\u002Fdiv>\n        <p style=\"font-family:'Jost';font-size:14.5px;line-height:1.55;color:#2D2D2D;margin:0;\">The core client happy path works end to end. Form, match, agreement, sign, and confirmation all route as intended, and the reminder engines are clean.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"qf-reveal\" data-reveal=\"\" style=\"grid-column:span 4;background:#F7F5E8;border:1px solid rgba(31,78,56,0.1);border-radius:25px;padding:26px;\">\n        <div style=\"font-family:'Poppins';font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#B07B14;margin-bottom:12px;\">What needs attention<\u002Fdiv>\n        <p style=\"font-family:'Jost';font-size:14.5px;line-height:1.55;color:#2D2D2D;margin:0;\">Assignments and notifications appear skipped, triggers fire without traffic control, and email deliverability is at risk from a silent DND behavior.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"qf-reveal\" data-reveal=\"\" style=\"grid-column:span 4;background:#F7F5E8;border:1px solid rgba(31,78,56,0.1);border-radius:25px;padding:26px;\">\n        <div style=\"font-family:'Poppins';font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#C0341A;margin-bottom:12px;\">What is missing<\u002Fdiv>\n        <p style=\"font-family:'Jost';font-size:14.5px;line-height:1.55;color:#2D2D2D;margin:0;\">The member portal needs real work. The credit system, a sessions counter, and login authentication appear not built, and door access is not yet time restricted.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SEC 1 — CURRENT STATE MAP ============ -->\n  <section id=\"map\" data-screen-label=\"Current state map\" data-label=\"Current state map\" style=\"background:#F7F5E8;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:88px 24px;\">\n      <div class=\"qf-reveal\" data-reveal=\"\" style=\"max-width:62ch;margin-bottom:30px;\">\n        <div style=\"font-family:'Poppins';font-size:13px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#38731A;margin-bottom:12px;\">01 / Current state map<\u002Fdiv>\n        <h2 style=\"font-family:'Poppins';font-weight:700;font-size:clamp(28px,3.4vw,40px);line-height:1.12;letter-spacing:-0.015em;margin:0 0 14px;color:#1F4E38;\">Both journeys, walked step by step<\u002Fh2>\n        <p style=\"font-family:'Jost';font-size:17px;line-height:1.6;color:#2D2D2D;margin:0;\">Each step is tagged for how it behaves today. The happy path holds. The trouble clusters at data capture and the handoffs between tools.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"qf-reveal\" data-reveal=\"\" style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:26px;\">\n        <div style=\"display:inline-flex;background:#FFFFFF;border:1px solid rgba(31,78,56,0.12);border-radius:9999px;padding:5px;gap:4px;box-shadow:0 2px 8px rgba(16,60,10,0.05);\">\n          <sc-for list=\"{{ journeyTabs }}\" as=\"tab\" hint-placeholder-count=\"2\">\n            <button onclick=\"{{ tab.onClick }}\" style=\"font-family:'Poppins';font-weight:500;font-size:14px;border:none;cursor:pointer;padding:10px 20px;border-radius:9999px;background:{{ tab.bg }};color:{{ tab.fg }};transition:background .2s,color .2s;\">{{ tab.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:18px;flex-wrap:wrap;font-family:'Poppins';font-size:13px;font-weight:500;color:#4B5563;\">\n          <span style=\"display:inline-flex;align-items:center;gap:7px;\"><span style=\"width:10px;height:10px;border-radius:50%;background:#38731A;\"><\u002Fspan>Working <strong style=\"color:#1F4E38;margin-left:2px;\">{{ workingCount }}<\u002Fstrong><\u002Fspan>\n          <span style=\"display:inline-flex;align-items:center;gap:7px;\"><span style=\"width:10px;height:10px;border-radius:50%;background:#E0A92E;\"><\u002Fspan>Partial <strong style=\"color:#1F4E38;margin-left:2px;\">{{ partialCount }}<\u002Fstrong><\u002Fspan>\n          <span style=\"display:inline-flex;align-items:center;gap:7px;\"><span style=\"width:10px;height:10px;border-radius:50%;background:#C0341A;\"><\u002Fspan>Broken <strong style=\"color:#1F4E38;margin-left:2px;\">{{ brokenCount }}<\u002Fstrong><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"qf-reveal\" data-reveal=\"\" style=\"font-family:'Jost';font-size:15.5px;line-height:1.6;color:#4B5563;max-width:70ch;margin:0 0 28px;\">{{ journeyBlurb }}<\u002Fp>\n\n      <div style=\"display:flex;flex-direction:column;gap:0;\">\n        <sc-for list=\"{{ steps }}\" as=\"step\" hint-placeholder-count=\"9\">\n          <div style=\"display:flex;gap:20px;\">\n            <div style=\"display:flex;flex-direction:column;align-items:center;flex:none;width:40px;\">\n              <div style=\"width:40px;height:40px;border-radius:50%;background:#FFFFFF;border:2px solid {{ step.statusDot }};display:flex;align-items:center;justify-content:center;font-family:'Poppins';font-weight:700;font-size:13px;color:{{ step.statusFg }};flex:none;z-index:1;\">{{ step.num }}<\u002Fdiv>\n              <div style=\"width:2px;flex:1;background:rgba(31,78,56,0.12);min-height:14px;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;padding-bottom:16px;\">\n              <div onclick=\"{{ step.onToggle }}\" style=\"background:#FFFFFF;border:1px solid rgba(31,78,56,0.1);border-radius:18px;padding:18px 22px;cursor:pointer;box-shadow:0 2px 8px rgba(16,60,10,0.04);transition:box-shadow .2s;\" style-hover=\"box-shadow:0 8px 24px rgba(16,60,10,0.09);\">\n                <div style=\"display:flex;align-items:center;gap:14px;\">\n                  <span style=\"display:inline-flex;align-items:center;gap:7px;background:{{ step.statusBg }};color:{{ step.statusFg }};font-family:'Poppins';font-size:11px;font-weight:600;letter-spacing:0.03em;padding:5px 11px;border-radius:9999px;text-transform:uppercase;white-space:nowrap;\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ step.statusDot }};\"><\u002Fspan>{{ step.statusLabel }}<\u002Fspan>\n                  <h4 style=\"font-family:'Poppins';font-weight:600;font-size:18px;color:#1F4E38;margin:0;flex:1;\">{{ step.label }}<\u002Fh4>\n                  <span style=\"font-family:'Poppins';font-size:18px;color:#9AA0A6;transform:{{ step.chevron }};transition:transform .2s;\">⌄<\u002Fspan>\n                <\u002Fdiv>\n                <p style=\"font-family:'Jost';font-size:14.5px;line-height:1.55;color:#4B5563;margin:12px 0 0;\">{{ step.summary }}<\u002Fp>\n                <sc-if value=\"{{ step.isOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:16px;padding-top:16px;border-top:1px solid rgba(31,78,56,0.1);display:flex;flex-direction:column;gap:10px;\">\n                    <sc-for list=\"{{ step.findingChips }}\" as=\"fc\" hint-placeholder-count=\"1\">\n                      <div style=\"display:flex;align-items:flex-start;gap:10px;\">\n                        <span style=\"font-family:'Poppins';font-size:11px;font-weight:700;color:{{ fc.fg }};background:{{ fc.bg }};padding:3px 8px;border-radius:6px;flex:none;margin-top:1px;\">{{ fc.id }}<\u002Fspan>\n                        <span style=\"font-family:'Jost';font-size:14px;color:#2D2D2D;line-height:1.5;\">{{ fc.title }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                    <sc-for list=\"{{ step.positiveChips }}\" as=\"pc\" hint-placeholder-count=\"1\">\n                      <div style=\"display:flex;align-items:flex-start;gap:10px;\">\n                        <span style=\"font-family:'Poppins';font-size:11px;font-weight:700;color:#1F4E38;background:#EAF3DE;padding:3px 8px;border-radius:6px;flex:none;margin-top:1px;\">{{ pc.id }}<\u002Fspan>\n                        <span style=\"font-family:'Jost';font-size:14px;color:#2D2D2D;line-height:1.5;\">{{ pc.text }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SEC 2 — FINDINGS & SEVERITY ============ -->\n  <section id=\"findings\" data-screen-label=\"Findings and severity\" data-label=\"Findings and severity\" style=\"background:#FFFFFF;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:88px 24px;\">\n      <div class=\"qf-reveal\" data-reveal=\"\" style=\"max-width:62ch;margin-bottom:28px;\">\n        <div style=\"font-family:'Poppins';font-size:13px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#38731A;margin-bottom:12px;\">02 / Findings &amp; severity<\u002Fdiv>\n        <h2 style=\"font-family:'Poppins';font-weight:700;font-size:clamp(28px,3.4vw,40px);line-height:1.12;letter-spacing:-0.015em;margin:0 0 14px;color:#1F4E38;\">The prioritized issue list<\u002Fh2>\n        <p style=\"font-family:'Jost';font-size:17px;line-height:1.6;color:#2D2D2D;margin:0;\">Every finding states what it is, where it lives, its impact, and whether it is a standard config fix or custom development. Filter by severity, then open any card for the detail.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"qf-reveal\" data-reveal=\"\" style=\"display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;\">\n        <sc-for list=\"{{ severityChips }}\" as=\"chip\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ chip.onClick }}\" style=\"display:inline-flex;align-items:center;gap:9px;font-family:'Poppins';font-weight:500;font-size:13.5px;cursor:pointer;padding:9px 16px;border-radius:9999px;background:{{ chip.bg }};color:{{ chip.fg }};border:1px solid {{ chip.border }};transition:background .2s,color .2s,border-color .2s;\">\n            <span style=\"width:9px;height:9px;border-radius:50%;background:{{ chip.dot }};\"><\u002Fspan>{{ chip.label }}\n            <span style=\"font-family:'Poppins';font-size:11.5px;font-weight:600;background:{{ chip.countBg }};color:{{ chip.countFg }};padding:2px 8px;border-radius:9999px;\">{{ chip.count }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <p class=\"qf-reveal\" data-reveal=\"\" style=\"font-family:'Jost';font-size:14px;color:#4B5563;margin:0 0 22px;\">{{ filterSummary }}<\u002Fp>\n\n      <div style=\"display:flex;flex-direction:column;gap:12px;\">\n        <sc-for list=\"{{ filteredFindings }}\" as=\"f\" hint-placeholder-count=\"6\">\n          <div style=\"background:{{ f.cardBg }};border:1px solid rgba(31,78,56,0.12);border-radius:18px;overflow:hidden;box-shadow:0 2px 8px rgba(16,60,10,0.05);transition:box-shadow .2s;\">\n            <div onclick=\"{{ f.onToggle }}\" style=\"display:flex;align-items:flex-start;gap:16px;padding:20px 24px;cursor:pointer;\">\n              <span style=\"display:inline-flex;align-items:center;gap:7px;background:{{ f.sevBg }};color:{{ f.sevFg }};font-family:'Poppins';font-size:11px;font-weight:600;letter-spacing:0.03em;padding:6px 12px;border-radius:9999px;text-transform:uppercase;white-space:nowrap;flex:none;margin-top:2px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ f.sevDot }};\"><\u002Fspan>{{ f.sevLabel }}<\u002Fspan>\n              <div style=\"flex:1;min-width:0;\">\n                <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;\">\n                  <span style=\"font-family:'Poppins';font-size:11.5px;font-weight:700;color:#9AA0A6;\">{{ f.id }}<\u002Fspan>\n                  <h4 style=\"font-family:'Poppins';font-weight:600;font-size:17.5px;color:#1F4E38;margin:0;line-height:1.3;\">{{ f.title }}<\u002Fh4>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px;\">\n                  <span style=\"font-family:'Poppins';font-size:11.5px;font-weight:500;color:{{ f.journeyFg }};background:{{ f.journeyBg }};padding:4px 10px;border-radius:9999px;\">{{ f.journeyLabel }}<\u002Fspan>\n                  <sc-for list=\"{{ f.typeTags }}\" as=\"t\" hint-placeholder-count=\"1\">\n                    <span style=\"font-family:'Poppins';font-size:11.5px;font-weight:500;color:{{ t.fg }};background:{{ t.bg }};padding:4px 10px;border-radius:9999px;\">{{ t.label }}<\u002Fspan>\n                  <\u002Fsc-for>\n                  <span style=\"font-family:'Jost';font-size:12.5px;color:#9AA0A6;\">{{ f.where }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"font-family:'Poppins';font-size:20px;color:#9AA0A6;transform:{{ f.chevron }};transition:transform .2s;flex:none;\">⌄<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ f.isOpen }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:0 24px 22px 24px;\">\n                <div style=\"padding:18px 20px;background:#F7F5E8;border-radius:14px;\">\n                  <p style=\"font-family:'Jost';font-size:15px;line-height:1.65;color:#2D2D2D;margin:0;\">{{ f.detail }}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SEC 3 — PRIORITY MATRIX ============ -->\n  <section id=\"matrix\" data-screen-label=\"Priority matrix\" data-label=\"Priority matrix\" style=\"background:#F7F5E8;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:88px 24px;\">\n      <div class=\"qf-reveal\" data-reveal=\"\" style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:26px;\">\n        <div style=\"max-width:60ch;\">\n          <div style=\"font-family:'Poppins';font-size:13px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#38731A;margin-bottom:12px;\">03 / Priority matrix<\u002Fdiv>\n          <h2 style=\"font-family:'Poppins';font-weight:700;font-size:clamp(28px,3.4vw,40px);line-height:1.12;letter-spacing:-0.015em;margin:0 0 14px;color:#1F4E38;\">Impact against effort<\u002Fh2>\n          <p style=\"font-family:'Jost';font-size:17px;line-height:1.6;color:#2D2D2D;margin:0;\">Every fix plotted so the order of work is obvious. High impact and low effort go top left. Filter to see how a journey or severity sits in the field.<\u002Fp>\n        <\u002Fdiv>\n        <span style=\"font-family:'Poppins';font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:#B07B14;background:#F6EDD7;padding:7px 14px;border-radius:9999px;white-space:nowrap;\">Draft values, to confirm<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"qf-reveal\" data-reveal=\"\" style=\"display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px;\">\n        <sc-for list=\"{{ mxJChips }}\" as=\"c\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ c.onClick }}\" style=\"font-family:'Poppins';font-weight:500;font-size:13px;cursor:pointer;padding:8px 15px;border-radius:9999px;background:{{ c.bg }};color:{{ c.fg }};border:1px solid {{ c.border }};transition:all .2s;\">{{ c.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n        <span style=\"width:1px;align-self:stretch;background:rgba(31,78,56,0.16);margin:0 4px;\"><\u002Fspan>\n        <sc-for list=\"{{ mxSChips }}\" as=\"c\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ c.onClick }}\" style=\"display:inline-flex;align-items:center;gap:8px;font-family:'Poppins';font-weight:500;font-size:13px;cursor:pointer;padding:8px 15px;border-radius:9999px;background:{{ c.bg }};color:{{ c.fg }};border:1px solid {{ c.border }};transition:all .2s;\"><span style=\"width:8px;height:8px;border-radius:50%;background:{{ c.dot }};\"><\u002Fspan>{{ c.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"background:#FFFFFF;border:1px solid rgba(31,78,56,0.1);border-radius:25px;padding:28px 28px 24px;box-shadow:0 8px 24px rgba(16,60,10,0.06);\">\n        <div style=\"display:flex;gap:16px;\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;flex:none;\">\n            <span style=\"font-family:'Poppins';font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#1F4E38;writing-mode:vertical-rl;transform:rotate(180deg);\">Impact →<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"flex:1;\">\n            <div data-plot=\"\" style=\"position:relative;width:100%;aspect-ratio:16/10;min-height:340px;background:linear-gradient(#FFFFFF,#FFFFFF);border-radius:14px;\">\n              <!-- quadrant tints -->\n              <div style=\"position:absolute;left:0;top:0;width:50%;height:50%;background:rgba(177,223,86,0.12);border-radius:14px 0 0 0;\"><\u002Fdiv>\n              <!-- gridlines -->\n              <div style=\"position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(31,78,56,0.12);\"><\u002Fdiv>\n              <div style=\"position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(31,78,56,0.12);\"><\u002Fdiv>\n              <div style=\"position:absolute;inset:0;border:1px solid rgba(31,78,56,0.1);border-radius:14px;pointer-events:none;\"><\u002Fdiv>\n              <!-- quadrant labels -->\n              <div style=\"position:absolute;left:14px;top:12px;font-family:'Poppins';font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:#38731A;\">Do first<\u002Fdiv>\n              <div style=\"position:absolute;right:14px;top:12px;font-family:'Poppins';font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:#9AA0A6;text-align:right;\">Plan the builds<\u002Fdiv>\n              <div style=\"position:absolute;left:14px;bottom:12px;font-family:'Poppins';font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:#9AA0A6;\">Easy extras<\u002Fdiv>\n              <div style=\"position:absolute;right:14px;bottom:12px;font-family:'Poppins';font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:#9AA0A6;text-align:right;\">Deprioritize<\u002Fdiv>\n              <!-- points -->\n              <sc-for list=\"{{ points }}\" as=\"p\" hint-placeholder-count=\"23\">\n                <div data-point=\"\" data-dim=\"{{ p.dimFlag }}\" onmouseenter=\"{{ p.onEnter }}\" onmouseleave=\"{{ p.onLeave }}\" onclick=\"{{ p.onEnter }}\" style=\"{{ p.pointStyle }}\"><\u002Fdiv>\n              <\u002Fsc-for>\n              <!-- tooltip -->\n              <sc-if value=\"{{ hover }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"{{ hover.boxStyle }}\">\n                  <div style=\"background:#1F4E38;color:#fff;border-radius:14px;padding:14px 16px;width:260px;box-shadow:0 16px 40px rgba(16,60,10,0.28);\">\n                    <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:8px;\">\n                      <span style=\"font-family:'Poppins';font-size:11px;font-weight:700;color:#fff;background:{{ hover.sevDot }};padding:3px 9px;border-radius:9999px;\">{{ hover.id }}<\u002Fspan>\n                      <span style=\"font-family:'Poppins';font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:rgba(255,255,255,0.7);\">{{ hover.quad }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <p style=\"font-family:'Jost';font-size:13.5px;line-height:1.45;color:#fff;margin:0 0 10px;\">{{ hover.title }}<\u002Fp>\n                    <div style=\"display:flex;gap:16px;font-family:'Poppins';font-size:12px;color:rgba(255,255,255,0.82);\">\n                      <span>Impact <strong style=\"color:#B1DF56;\">{{ hover.impact }}<\u002Fstrong><\u002Fspan>\n                      <span>Effort <strong style=\"color:#B1DF56;\">{{ hover.effort }}<\u002Fstrong><\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"text-align:center;margin-top:10px;font-family:'Poppins';font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#1F4E38;\">Effort →<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"qf-reveal\" data-reveal=\"\" style=\"font-family:'Jost';font-size:13.5px;color:#4B5563;margin:16px 0 0;text-align:center;\">Hover or tap any point for the finding behind it. Dimmed points sit outside the current filter.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SEC 4 — HEALTH SCORECARD ============ -->\n  <section id=\"scorecard\" data-screen-label=\"Health scorecard\" data-label=\"Health scorecard\" style=\"background:#1F4E38;color:#FFFFFF;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:96px 24px;\">\n      <div class=\"qf-reveal\" data-reveal=\"\" style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:36px;\">\n        <div style=\"max-width:60ch;\">\n          <div style=\"font-family:'Poppins';font-size:13px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#B1DF56;margin-bottom:12px;\">04 / Health scorecard<\u002Fdiv>\n          <h2 style=\"font-family:'Poppins';font-weight:700;font-size:clamp(28px,3.4vw,40px);line-height:1.12;letter-spacing:-0.015em;margin:0 0 14px;color:#FFFFFF;\">The verdict, one glance per category<\u002Fh2>\n          <p style=\"font-family:'Jost';font-size:17px;line-height:1.6;color:rgba(255,255,255,0.78);margin:0;\">Nine categories rated green, yellow, or red. Open any card for the findings driving the rating.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n          <span style=\"display:inline-flex;align-items:center;gap:8px;font-family:'Poppins';font-size:13px;font-weight:500;color:#fff;background:rgba(255,255,255,0.08);padding:8px 14px;border-radius:9999px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#B1DF56;\"><\u002Fspan>{{ greenCount }} green<\u002Fspan>\n          <span style=\"display:inline-flex;align-items:center;gap:8px;font-family:'Poppins';font-size:13px;font-weight:500;color:#fff;background:rgba(255,255,255,0.08);padding:8px 14px;border-radius:9999px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#FBBF24;\"><\u002Fspan>{{ yellowCount }} yellow<\u002Fspan>\n          <span style=\"display:inline-flex;align-items:center;gap:8px;font-family:'Poppins';font-size:13px;font-weight:500;color:#fff;background:rgba(255,255,255,0.08);padding:8px 14px;border-radius:9999px;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#FF6B4A;\"><\u002Fspan>{{ redCount }} red<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"qf-grid-3\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;\">\n        <sc-for list=\"{{ cats }}\" as=\"cat\" hint-placeholder-count=\"9\">\n          <div onclick=\"{{ cat.onToggle }}\" style=\"background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:25px;padding:28px 26px;cursor:pointer;transition:background .2s,transform .2s;\" style-hover=\"background:rgba(255,255,255,0.08);transform:translateY(-4px);\">\n            <div style=\"position:relative;width:124px;height:124px;margin:0 auto 18px;\">\n              <svg width=\"124\" height=\"124\" viewBox=\"0 0 124 124\" style=\"display:block;\">\n                <circle cx=\"62\" cy=\"62\" r=\"52\" fill=\"none\" stroke=\"rgba(255,255,255,0.12)\" stroke-width=\"10\"><\u002Fcircle>\n                <circle cx=\"62\" cy=\"62\" r=\"52\" fill=\"none\" stroke=\"{{ cat.ratingColor }}\" stroke-width=\"10\" stroke-linecap=\"round\" transform=\"rotate(-90 62 62)\" data-ring=\"\" data-circ=\"{{ cat.circ }}\" data-off=\"{{ cat.off }}\" style=\"{{ cat.ringStyle }}\"><\u002Fcircle>\n              <\u002Fsvg>\n              <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;\">\n                <span style=\"font-family:'Poppins';font-weight:800;font-size:30px;line-height:1;color:#FFFFFF;\"><span data-countup=\"{{ cat.score }}\">{{ cat.score }}<\u002Fspan><\u002Fspan>\n                <span style=\"font-family:'Poppins';font-size:10.5px;font-weight:500;color:rgba(255,255,255,0.55);margin-top:2px;\">/ 100<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;\">\n              <span style=\"font-family:'Poppins';font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:{{ cat.ratingColor }};background:{{ cat.pillBg }};padding:4px 12px;border-radius:9999px;\">{{ cat.rating }}<\u002Fspan>\n            <\u002Fdiv>\n            <h4 style=\"font-family:'Poppins';font-weight:600;font-size:17px;color:#FFFFFF;margin:0;text-align:center;line-height:1.3;\">{{ cat.cat }}<\u002Fh4>\n            <div style=\"display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;font-family:'Poppins';font-size:12px;font-weight:500;color:rgba(255,255,255,0.6);\">\n              <span>Drivers<\u002Fspan><span style=\"transform:{{ cat.chevron }};transition:transform .2s;\">⌄<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ cat.isOpen }}\" hint-placeholder-val=\"{{ false }}\">\n              <p style=\"font-family:'Jost';font-size:13.5px;line-height:1.55;color:rgba(255,255,255,0.78);margin:14px 0 0;padding-top:14px;border-top:1px solid rgba(255,255,255,0.12);text-align:center;\">{{ cat.by }}<\u002Fp>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <p class=\"qf-reveal\" data-reveal=\"\" style=\"font-family:'Jost';font-size:13.5px;color:rgba(255,255,255,0.55);margin:24px 0 0;\">Ratings are a working draft for Ryan and Aleia to confirm before publish.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SEC 5 — REMEDIATION ROADMAP ============ -->\n  <section id=\"roadmap\" data-screen-label=\"Remediation roadmap\" data-label=\"Remediation roadmap\" style=\"background:#FFFFFF;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:88px 24px;\">\n      <div class=\"qf-reveal\" data-reveal=\"\" style=\"max-width:62ch;margin-bottom:30px;\">\n        <div style=\"font-family:'Poppins';font-size:13px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#38731A;margin-bottom:12px;\">05 / Remediation roadmap<\u002Fdiv>\n        <h2 style=\"font-family:'Poppins';font-weight:700;font-size:clamp(28px,3.4vw,40px);line-height:1.12;letter-spacing:-0.015em;margin:0 0 14px;color:#1F4E38;\">One coordinated repair, in sequence<\u002Fh2>\n        <p style=\"font-family:'Jost';font-size:17px;line-height:1.6;color:#2D2D2D;margin:0;\">Restore the core, clean the structure, then build what is missing. Blockers and verifications run in parallel. Step through each phase.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"qf-reveal\" data-reveal=\"\" style=\"display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;\">\n        <sc-for list=\"{{ phaseTabs }}\" as=\"pt\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ pt.onClick }}\" style=\"display:flex;align-items:center;gap:12px;text-align:left;cursor:pointer;border:1px solid {{ pt.border }};background:{{ pt.bg }};border-radius:16px;padding:14px 18px;transition:all .2s;flex:1;min-width:200px;\">\n            <span style=\"font-family:'Poppins';font-weight:800;font-size:22px;color:{{ pt.numColor }};line-height:1;\">{{ pt.n }}<\u002Fspan>\n            <span style=\"display:flex;flex-direction:column;gap:3px;\">\n              <span style=\"font-family:'Poppins';font-weight:600;font-size:15px;color:{{ pt.nameColor }};line-height:1.2;\">{{ pt.name }}<\u002Fspan>\n              <span style=\"font-family:'Poppins';font-size:11px;font-weight:500;color:{{ pt.kindColor }};text-transform:uppercase;letter-spacing:0.04em;\">{{ pt.kind }}<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"background:#F7F5E8;border-radius:25px;padding:36px;\">\n        <div style=\"display:flex;align-items:flex-start;gap:18px;flex-wrap:wrap;margin-bottom:24px;\">\n          <span style=\"font-family:'Poppins';font-weight:800;font-size:56px;line-height:0.9;color:#B1DF56;letter-spacing:-0.02em;-webkit-text-stroke:1.5px #38731A;\">{{ phaseData.n }}<\u002Fspan>\n          <div style=\"flex:1;min-width:240px;\">\n            <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px;\">\n              <h3 style=\"font-family:'Poppins';font-weight:700;font-size:26px;color:#1F4E38;margin:0;\">{{ phaseData.name }}<\u002Fh3>\n              <span style=\"font-family:'Poppins';font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:#38731A;background:#EAF3DE;padding:5px 12px;border-radius:9999px;\">{{ phaseData.kind }}<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-family:'Jost';font-size:16px;line-height:1.6;color:#2D2D2D;margin:0;max-width:64ch;\">{{ phaseData.intro }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-family:'Poppins';font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#4B5563;margin-bottom:14px;\">{{ phaseData.count }} fixes in this phase<\u002Fdiv>\n        <div class=\"qf-grid-2\" style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:26px;\">\n          <sc-for list=\"{{ phaseData.fixes }}\" as=\"fx\" hint-placeholder-count=\"7\">\n            <div style=\"display:flex;align-items:flex-start;gap:12px;background:#FFFFFF;border:1px solid rgba(31,78,56,0.1);border-radius:14px;padding:14px 16px;\">\n              <span style=\"width:9px;height:9px;border-radius:50%;background:{{ fx.dot }};flex:none;margin-top:6px;\"><\u002Fspan>\n              <div style=\"flex:1;min-width:0;\">\n                <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:3px;\">\n                  <span style=\"font-family:'Poppins';font-size:11px;font-weight:700;color:#9AA0A6;\">{{ fx.id }}<\u002Fspan>\n                  <span style=\"font-family:'Poppins';font-size:10.5px;font-weight:600;color:{{ fx.sevFg }};text-transform:uppercase;letter-spacing:0.03em;\">{{ fx.sevLabel }}<\u002Fspan>\n                <\u002Fdiv>\n                <span style=\"font-family:'Jost';font-size:14px;color:#2D2D2D;line-height:1.45;\">{{ fx.title }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:flex-start;gap:14px;background:#1F4E38;border-radius:18px;padding:20px 24px;\">\n          <span style=\"font-family:'Poppins';font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:#103C0A;background:#B1DF56;padding:6px 12px;border-radius:9999px;flex:none;\">Outcome<\u002Fspan>\n          <p style=\"font-family:'Jost';font-size:15.5px;line-height:1.55;color:#FFFFFF;margin:0;\">{{ phaseData.outcome }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SEC 6 — OPEN ITEMS ============ -->\n  <section id=\"open\" data-screen-label=\"Open items from JP\" data-label=\"Open items from JP\" style=\"background:#F7F5E8;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:88px 24px;\">\n      <div class=\"qf-reveal\" data-reveal=\"\" style=\"max-width:62ch;margin-bottom:30px;\">\n        <div style=\"font-family:'Poppins';font-size:13px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#38731A;margin-bottom:12px;\">06 / Open items &amp; needs from JP<\u002Fdiv>\n        <h2 style=\"font-family:'Poppins';font-weight:700;font-size:clamp(28px,3.4vw,40px);line-height:1.12;letter-spacing:-0.015em;margin:0 0 14px;color:#1F4E38;\">What we need unlocked or confirmed<\u002Fh2>\n        <p style=\"font-family:'Jost';font-size:17px;line-height:1.6;color:#2D2D2D;margin:0;\">A short register of blockers and verifications. Each one clears a path to fully audit or fix part of the account.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"qf-grid-2\" style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:16px;\">\n        <sc-for list=\"{{ openCards }}\" as=\"o\" hint-placeholder-count=\"8\">\n          <div style=\"background:#FFFFFF;border:1px solid rgba(31,78,56,0.1);border-radius:18px;padding:24px 26px;box-shadow:0 2px 8px rgba(16,60,10,0.05);\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;\">\n              <span style=\"font-family:'Poppins';font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:{{ o.tagFg }};background:{{ o.tagBg }};padding:5px 12px;border-radius:9999px;\">{{ o.tag }}<\u002Fspan>\n            <\u002Fdiv>\n            <h4 style=\"font-family:'Poppins';font-weight:600;font-size:17px;color:#1F4E38;margin:0 0 8px;line-height:1.3;\">{{ o.item }}<\u002Fh4>\n            <p style=\"font-family:'Jost';font-size:14.5px;line-height:1.55;color:#4B5563;margin:0;\">{{ o.why }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CLOSING — NEXT STEP ============ -->\n  <section id=\"next\" data-screen-label=\"Recommended next step\" data-label=\"Recommended next step\" style=\"background:#103C0A;color:#FFFFFF;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:96px 24px;\">\n      <div class=\"qf-reveal\" data-reveal=\"\" style=\"max-width:64ch;\">\n        <div style=\"font-family:'Poppins';font-size:13px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#B1DF56;margin-bottom:14px;\">Recommended next step<\u002Fdiv>\n        <h2 style=\"font-family:'Poppins';font-weight:700;font-size:clamp(30px,4vw,46px);line-height:1.08;letter-spacing:-0.02em;margin:0 0 18px;color:#FFFFFF;text-wrap:balance;\">Run the repair as one coordinated fix, not 21 tickets.<\u002Fh2>\n        <p style=\"font-family:'Jost';font-size:17.5px;line-height:1.65;color:rgba(255,255,255,0.82);margin:0 0 8px;\">Phase one restores the core so leads and applicants stop falling through. Phase two cleans and brands the automation layer. Phase three builds the portal and credit model the spec describes. The blockers and verifications with JP run alongside.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"qf-grid-3\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:36px 0 30px;\">\n        <div style=\"background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:24px;\">\n          <div style=\"font-family:'Poppins';font-weight:800;font-size:20px;color:#B1DF56;margin-bottom:8px;\">Phase 1<\u002Fdiv>\n          <div style=\"font-family:'Poppins';font-weight:600;font-size:16px;color:#fff;margin-bottom:6px;\">Restore the core<\u002Fdiv>\n          <p style=\"font-family:'Jost';font-size:14px;line-height:1.55;color:rgba(255,255,255,0.72);margin:0;\">Routing, assignments, deliverability, and the Designation fix. Standard config.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:24px;\">\n          <div style=\"font-family:'Poppins';font-weight:800;font-size:20px;color:#B1DF56;margin-bottom:8px;\">Phase 2<\u002Fdiv>\n          <div style=\"font-family:'Poppins';font-weight:600;font-size:16px;color:#fff;margin-bottom:6px;\">Clean the structure<\u002Fdiv>\n          <p style=\"font-family:'Jost';font-size:14px;line-height:1.55;color:rgba(255,255,255,0.72);margin:0;\">Consolidate, rebuild, and brand the automation layer. Accurate pipeline reporting.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:24px;\">\n          <div style=\"font-family:'Poppins';font-weight:800;font-size:20px;color:#B1DF56;margin-bottom:8px;\">Phase 3<\u002Fdiv>\n          <div style=\"font-family:'Poppins';font-weight:600;font-size:16px;color:#fff;margin-bottom:6px;\">Build what is missing<\u002Fdiv>\n          <p style=\"font-family:'Jost';font-size:14px;line-height:1.55;color:rgba(255,255,255,0.72);margin:0;\">The GoHighLevel credit and sessions model, plus a secure purchase path. Scheduling and payments run in Acuity. Custom development.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,0.14);padding-top:26px;\">\n        <span style=\"font-family:'Jost';font-size:15px;line-height:1.6;color:rgba(255,255,255,0.72);max-width:66ch;\">This document is the audit itself. Scope, sequencing, and pricing for the build and fix are handled with you directly as a separate step, once priorities are confirmed.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  \n\n  <!-- ============ FOOTER ============ -->\n  <footer data-screen-label=\"Footer\" style=\"background:#0C2E07;color:#FFFFFF;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:56px 24px 44px;display:flex;align-items:flex-start;justify-content:space-between;gap:32px;flex-wrap:wrap;\">\n      <div style=\"max-width:44ch;\">\n        <img src=\"c8d718f8-b6aa-4323-a929-6aea46110f92\" alt=\"QuikFire\" style=\"height:40px;width:auto;display:block;margin-bottom:16px;\">\n\n        <p style=\"font-family:'Jost';font-size:14.5px;line-height:1.6;color:rgba(255,255,255,0.7);margin:0;\">Prepared for Trust In Train. This audit covers both intake journeys as they were found in the GoHighLevel account on the date of review.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:54px;flex-wrap:wrap;\">\n        <div>\n          <div style=\"font-family:'Poppins';font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:12px;\">Audit team<\u002Fdiv>\n          <div style=\"font-family:'Jost';font-size:14.5px;color:rgba(255,255,255,0.85);line-height:1.8;\">Ryan<br>Aleia<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Poppins';font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:12px;\">Contact<\u002Fdiv>\n          <div style=\"font-family:'Jost';font-size:14.5px;color:rgba(255,255,255,0.85);line-height:1.8;\">support@quikfire.io<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid rgba(255,255,255,0.12);\">\n      <div style=\"max-width:1200px;margin:0 auto;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;font-family:'Jost';font-size:13px;color:rgba(255,255,255,0.55);\">\n        <span>Built by Quik Fire<\u002Fspan>\n        <span>Trust In Train, McLean &amp; Vienna<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:860}}\">\nclass Component extends DCLogic {\n  state = {\n    severityFilter: 'all',\n    expandedFinding: null,\n    activeJourney: 'client',\n    expandedStep: null,\n    mxJourney: 'all',\n    mxSeverity: 'all',\n    hoverPoint: null,\n    activePhase: 0,\n    expandedCat: null,\n    scatterIn: false,\n  };\n\n  sevColors = {\n    Critical: { fg:'#B23A1E', bg:'#F6E2DA', dot:'#C0341A' },\n    High:     { fg:'#8A5A12', bg:'#F6EDD7', dot:'#E0A92E' },\n    Medium:   { fg:'#475569', bg:'#ECEFEF', dot:'#6B7280' },\n    Low:      { fg:'#6B7280', bg:'#F2F2EF', dot:'#9AA0A6' },\n  };\n  statusColors = {\n    working: { fg:'#1F4E38', bg:'#EAF3DE', dot:'#38731A', label:'Working' },\n    partial: { fg:'#8A5A12', bg:'#F6EDD7', dot:'#E0A92E', label:'Partial' },\n    broken:  { fg:'#B23A1E', bg:'#F6E2DA', dot:'#C0341A', label:'Broken' },\n  };\n  typeMeta = {\n    Config: { label:'Standard config', bg:'#EAF3DE', fg:'#2E5A1E' },\n    Custom: { label:'Custom dev', bg:'#ECEFEF', fg:'#475569' },\n    Verify: { label:'Verify with JP', bg:'#F6EDD7', fg:'#8A5A12' },\n  };\n  ratingDark = {\n    Green:  { c:'#B1DF56', pill:'rgba(177,223,86,0.16)' },\n    Yellow: { c:'#FBBF24', pill:'rgba(251,191,36,0.16)' },\n    Red:    { c:'#FF6B4A', pill:'rgba(255,107,74,0.16)' },\n  };\n  tagColors = {\n    Blocker:        { bg:'#F6E2DA', fg:'#B23A1E' },\n    Linchpin:       { bg:'#EAF3DE', fg:'#2E5A1E' },\n    Integration:    { bg:'#F6EDD7', fg:'#8A5A12' },\n    Cleanup:        { bg:'#ECEFEF', fg:'#475569' },\n    Data:           { bg:'#ECEFEF', fg:'#475569' },\n    Deliverability: { bg:'#F6EDD7', fg:'#8A5A12' },\n  };\n\n  findings = [\n    { id:'F-01', sev:'High', journey:'Both', types:['Config','Verify'], where:'Designation-gated workflows', title:'Designation field blank for many contacts can stop nurture', detail:'Two gated workflows per journey rely on a custom Designation field, and it is blank for many contacts, so those contacts can fall through to None and their nurture and lifecycle sequences stop. Where Designation should be populated needs confirming with JP.' },\n    { id:'F-02', sev:'Critical', journey:'Both', types:['Config'], where:'Multiple workflows', title:'Skipped user assignment stops internal notifications and routing', detail:'Across multiple workflows the assign-to-user step appears skipped, which also stops the internal notifications that depend on it. Owners are not alerted and contacts are not handed to the right person. JP\\u2019s user is likely not configured as assignable or notifiable in the sub-account.', headline:true },\n    { id:'F-03', sev:'Medium', journey:'Both', types:['Config'], where:'Calendar and feedback pages', title:'Blank confirmation and redirect pages', detail:'Calendar confirmation and feedback redirect pages render empty because no URL parameters are passed through to them.' },\n    { id:'F-04', sev:'Medium', journey:'Both', types:['Config'], where:'Pipelines', title:'No dedicated Lost or Disqualified stage', detail:'Declined or lost contacts keep their active stage (Consultation Booked, New Lead). The status flips to Lost but the stage does not move, which distorts pipeline counts. Only an on-hold stage exists today.' },\n    { id:'F-05', sev:'High', journey:'Both', types:['Verify'], where:'System folder, incl. [7.12] Attribution', title:'Locked System automations folder', detail:'The entire System folder is locked and cannot be audited. Aleia flagged problematic DND actions inside, which may tie to the silent Email DND issue. Severity is unverified until the folder is unlocked.', unverified:true },\n    { id:'F-06', sev:'High', journey:'Both', types:['Config'], where:'Multiple workflows', title:'Unfiltered Contact Created triggers', detail:'Multiple workflows fire on Contact Created with no filters, creating overlapping parallel execution with no traffic control and competing assignment and pipeline moves.' },\n    { id:'F-07', sev:'High', journey:'Client', types:['Config'], where:'Account-wide', title:'Silent Email DND on bounce', detail:'A mistyped or bounced email appears to auto-enable Email DND, leaving the contact silently un-emailable with no alert and no bounce safety net.' },\n    { id:'F-08', sev:'Medium', journey:'Client', types:['Config'], where:'[201.011] Guest Form', title:'Deprecated Create/Update Opportunity action erroring', detail:'The action GoHighLevel is replacing is erroring in the Guest Form workflow. It needs a rebuild with current actions, and other workflows should be audited for the same action.' },\n    { id:'F-09', sev:'Medium', journey:'Client', types:['Config'], where:'[501.1432] and outcome form', title:'Feedback and decline data not captured', detail:'Client rating (1 to 5) and trainer decline reason are not written to contact or opportunity fields, and the team notification appears skipped. The data is collected and then lost.' },\n    { id:'F-10', sev:'Medium', journey:'Client', types:['Config'], where:'[501.142] vs [501.1412]', title:'Wrong reminder-removal target', detail:'The outcome workflow removes the contact from [501.1411] instead of [501.1412], so post-consult upcoming-consult reminders keep firing. Easy fix.' },\n    { id:'F-11', sev:'High', journey:'Client', types:['Config','Verify'], where:'[801.06]', title:'Trainer match depends on a Google Sheet row', detail:'A trainer missing from the lookup sheet causes a silent match failure and a downstream stall (JP failed, Julian worked). The sheet sync process needs confirming.' },\n    { id:'F-12', sev:'Medium', journey:'Client', types:['Config'], where:'GAA send, two sources', title:'Duplicate agreement send', detail:'The registration path and the appointment path both send the agreement, creating overlapping sign requests. These should consolidate to one source.' },\n    { id:'F-13', sev:'Medium', journey:'Client', types:['Config'], where:'Consult / GAA SMS', title:'SMS deliverability', detail:'Long, link-heavy SMS appear filtered by carriers. They should be shortened and use a branded link domain. A2P 10DLC registration is confirmed.' },\n    { id:'F-15', sev:'High', journey:'Member', types:['Config'], where:'MSA invite workflows', title:'Redundant and inverted MSA invite workflows', detail:'Two workflows send the MSA invite reacting to the same moment with no coordination, and the tag logic appears inverted (a WaitingtoSign tag applied after a Signed condition). They should consolidate and rebuild.' },\n    { id:'F-16', sev:'Medium', journey:'Member', types:['Config'], where:'Appointment settings', title:'Native appointment notifications instead of branded emails', detail:'Post-booking confirmations come from native appointment notification settings on older templates rather than branded, workflow-controlled emails.' },\n    { id:'F-18', sev:'Low', journey:'Member', types:['Config'], where:'Calendars', title:'Calendar naming collision', detail:'Both location calendars are named Member Interview, which makes routing and reporting ambiguous.' },\n    { id:'F-19', sev:'Critical', journey:'Member', types:['Custom'], where:'Portal', title:'No package-credit to lane-booking connection in GoHighLevel', detail:'In GoHighLevel, packages and lane bookings appear to run as parallel, unconnected transactions, so a trainer could buy a package and still be charged per lane. The credit link is not built here. Scheduling and payments currently run in Acuity, which explains the test-mode payments and which we could not audit.' },\n    { id:'F-20', sev:'High', journey:'Member', types:['Custom'], where:'Portal', title:'No sessions-remaining counter', detail:'The portal has no sessions-remaining visibility. The spec requirement has nothing behind it. It depends on F-19.' },\n    { id:'F-21', sev:'High', journey:'Member', types:['Custom'], where:'Package and credit purchase', title:'No real authentication on the package and credit purchase path', detail:'The membership portal itself authenticates through GoHighLevel, which is fine. The package and credit purchase path, though, does not sit behind a real auth layer, which is a data-integrity and privacy concern for what a member can buy or view.' },\n    { id:'F-23', sev:'Low', journey:'Client', types:['Config'], where:'[801.05] + Make to Kisi', title:'Kisi provisioning email did not arrive on the client-side test', detail:'The member-side Kisi door-access flow works end to end. On the client-side test the webhook fired and is confirmed, but the provisioning email never reached the client. The gap is localized to [801.05] and the Make to Kisi integration.' },\n    { id:'F-24', sev:'Medium', journey:'Member', types:['Custom'], where:'Portal booking', title:'No client dropdown or recurring booking in the GoHighLevel portal', detail:'Based on what is in GoHighLevel today, there is no prepopulated client dropdown and no recurring or multi-client booking. The live booking flow currently runs in Acuity, which we do not have access to audit, so this reflects the GoHighLevel side only.' },\n  ];\n\n  positives = [\n    { id:'P-01', text:'The member Pre-Qual workflow routes correctly off the scored form fields.' },\n    { id:'P-02', text:'The core client happy-path spine works: form, match, agreement, sign, Confirmed, confirmation emails, opportunity advance.' },\n    { id:'P-03', text:'Signed-path confirmation is solid: the appointment flips to Confirmed, client and trainer get correct trainer and location details, tags apply, and the opportunity moves to Consultation Booked.' },\n    { id:'P-04', text:'Reminder engines ([501.0111], [501.1412], [501.1431]) are clean, goal-based, and stop on signing.' },\n    { id:'P-05', text:'The trainer outcome form ([501.142]) has working conditional decline logic, and the Converted branch enrolls into Kisi provisioning.' },\n    { id:'P-06', text:'URL-parameter pre-fill on the feedback and trainer forms is in place, a useful foundation for future portal work.' },\n  ];\n\n  matrix = [\n    { id:'F-01', short:'Designation routing', impact:10, effort:5, quad:'Do first' },\n    { id:'F-02', short:'Skipped assignments', impact:7, effort:2, quad:'Quick win' },\n    { id:'F-10', short:'Wrong reminder removal', impact:6, effort:1, quad:'Quick win' },\n    { id:'F-07', short:'Silent Email DND', impact:8, effort:4, quad:'Do first' },\n    { id:'F-11', short:'Google Sheet match', impact:8, effort:4, quad:'Do first' },\n    { id:'F-12', short:'Duplicate agreement send', impact:6, effort:2, quad:'Quick win' },\n    { id:'F-06', short:'Unfiltered triggers', impact:8, effort:6, quad:'Plan' },\n    { id:'F-15', short:'MSA consolidation', impact:7, effort:5, quad:'Plan' },\n    { id:'F-04', short:'Add Lost stage', impact:5, effort:2, quad:'Quick win' },\n    { id:'F-09', short:'Capture feedback data', impact:6, effort:3, quad:'Quick win' },\n    { id:'F-08', short:'Deprecated opp action', impact:5, effort:3, quad:'Quick win' },\n    { id:'F-03', short:'Blank pages / URL params', impact:5, effort:3, quad:'Quick win' },\n    { id:'F-16', short:'Branded notifications', impact:4, effort:3, quad:'Lower' },\n    { id:'F-13', short:'SMS deliverability', impact:6, effort:5, quad:'Plan' },\n    { id:'F-18', short:'Calendar naming', impact:3, effort:1, quad:'Lower' },\n    { id:'F-19', short:'Package / credit system', impact:10, effort:9, quad:'Plan' },\n    { id:'F-20', short:'Sessions-remaining counter', impact:8, effort:7, quad:'Plan' },\n    { id:'F-21', short:'Portal authentication', impact:8, effort:6, quad:'Plan' },\n    { id:'F-24', short:'Recurring / multi-booking', impact:7, effort:8, quad:'Plan' },\n    { id:'F-23', short:'Kisi time-restricted access', impact:6, effort:8, quad:'Plan' },\n    { id:'F-05', short:'Unlock System folder', impact:7, effort:1, quad:'Quick win' },\n  ];\n\n  scorecard = [\n    { cat:'Core Journey Spine', rating:'Green', score:88, by:'The client happy path works end to end (P-02, P-03), and Pre-Qual routes correctly (P-01).' },\n    { cat:'Automation Integrity', rating:'Red', score:28, by:'F-01, F-06, F-15, F-08, F-10.' },\n    { cat:'Data & Field Hygiene', rating:'Red', score:34, by:'F-01 blank Designation for many contacts, and F-09 feedback and decline data not stored.' },\n    { cat:'Deliverability (Email & SMS)', rating:'Red', score:32, by:'F-07, F-13, and suspected DND inside F-05.' },\n    { cat:'Pipeline Health', rating:'Yellow', score:60, by:'F-04, declined contacts retaining their active stage.' },\n    { cat:'Security & Privacy', rating:'Yellow', score:56, by:'The membership portal authenticates through GoHighLevel. The package and credit purchase path (F-21) has no real auth layer.' },\n    { cat:'Portal & Member Experience', rating:'Red', score:30, by:'F-19, F-20, F-21, F-24. Scheduling and payments currently run in Acuity.' },\n    { cat:'Integrations (Kisi, Google Sheet)', rating:'Yellow', score:58, by:'F-11 sheet dependency, F-23 Kisi gap.' },\n    { cat:'Visibility & Auditability', rating:'Yellow', score:55, by:'F-05 locked System folder blocks full review.' },\n  ];\n\n  journeys = {\n    client: {\n      label: 'Client intake',\n      blurb: 'How a client books and signs for a consultation with a trainer. The happy-path spine works. The failures sit at the edges, in data capture, and in integration handoffs.',\n      steps: [\n        { label:'Guest form', status:'partial', summary:'Intake captures the lead, but the deprecated opportunity action is erroring here.', fids:['F-08'], pids:[] },\n        { label:'Contact created', status:'broken', summary:'Multiple unfiltered triggers fire at once with no traffic control, competing on assignment and pipeline moves.', fids:['F-06'], pids:[] },\n        { label:'Designation routing', status:'partial', summary:'The gating Designation field is blank for many contacts, so those contacts can drop out of nurture. Where it should be set needs confirming.', fids:['F-01'], pids:[] },\n        { label:'Assignment & alerts', status:'broken', summary:'Assign-to-user and internal notifications appear skipped, so owners do not get told.', fids:['F-02'], pids:[] },\n        { label:'Trainer match', status:'partial', summary:'Matching works when the trainer exists in the Google Sheet, and stalls silently when a row is missing.', fids:['F-11'], pids:[] },\n        { label:'Agreement & sign', status:'working', summary:'The core spine is solid. The one issue is a duplicate agreement send from two sources.', fids:['F-12'], pids:['P-02','P-03'] },\n        { label:'Confirm & remind', status:'partial', summary:'Reminder engines are clean and goal-based, but confirmation pages render blank and one reminder-removal targets the wrong workflow.', fids:['F-03','F-10'], pids:['P-04'] },\n        { label:'Outcome & feedback', status:'partial', summary:'Decline logic works, but the client rating and trainer decline reason are collected and then not stored.', fids:['F-09'], pids:['P-05'] },\n        { label:'Deliverability', status:'broken', summary:'A silent Email DND on bounce leaves contacts un-emailable, and long link-heavy SMS appear filtered.', fids:['F-07','F-13'], pids:[] },\n      ],\n    },\n    member: {\n      label: 'Member / trainer intake',\n      blurb: 'How a trainer applies, qualifies, interviews, signs the Membership Services Agreement, pays, and reaches the portal. The front of the journey routes well. Scheduling and payments currently run in Acuity, so parts of the portal are not built in GoHighLevel yet.',\n      steps: [\n        { label:'Pre-Qual', status:'working', summary:'The Pre-Qual workflow routes correctly off the scored form fields.', fids:[], pids:['P-01'] },\n        { label:'Interview booking', status:'partial', summary:'Booking works, but both location calendars share the name Member Interview, which makes routing and reporting ambiguous.', fids:['F-18'], pids:[] },\n        { label:'MSA invite & sign', status:'broken', summary:'Two uncoordinated workflows send the MSA invite and the tag logic appears inverted. Confirmations also come from native settings rather than branded emails.', fids:['F-15','F-16'], pids:[] },\n        { label:'MSA to payment', status:'working', summary:'After signing, the member is routed onward and the redirect is in place. It glitched in one test with no fault found. Payments currently run through Acuity.', fids:[], pids:[] },\n        { label:'Portal access', status:'working', summary:'The membership portal authenticates through GoHighLevel, so portal login itself is sound.', fids:[], pids:[] },\n        { label:'Packages & credits', status:'broken', summary:'In GoHighLevel the package-credit link, a sessions-remaining counter, and a real auth layer on the purchase path appear not built. Scheduling and payments currently run in Acuity, which we could not audit.', fids:['F-19','F-20','F-21'], pids:[] },\n        { label:'Booking experience', status:'partial', summary:'On the GoHighLevel side there is no client dropdown and no recurring or multi-client booking. The live flow runs in Acuity, which we do not have access to audit.', fids:['F-24'], pids:[] },\n        { label:'Door access (Kisi)', status:'working', summary:'The member Kisi door-access flow works end to end. A provisioning email did not complete in one client-side test.', fids:['F-23'], pids:['P-05'] },\n      ],\n    },\n  };\n\n  phases = [\n    { n:'01', name:'Restore the core', kind:'Standard config', intro:'Stop the silent failures so every applicant and lead gets routed, assigned, and reached.', fixes:['F-01','F-02','F-07','F-10','F-11','F-12','F-06'], outcome:'Contacts stop falling through, comms reach people, and owners get their notifications.' },\n    { n:'02', name:'Clean the structure', kind:'Standard config', intro:'Consolidate, rebuild, and brand the automation layer into something auditable.', fixes:['F-15','F-08','F-04','F-09','F-03','F-16','F-13','F-18'], outcome:'One clean, branded, coordinated automation layer with accurate pipeline reporting.' },\n    { n:'03', name:'Build what is missing', kind:'Custom development', intro:'The custom development that makes the GoHighLevel membership model and portal function, for the parts not handled in Acuity.', fixes:['F-19','F-20','F-21','F-24'], outcome:'The GoHighLevel portal handles credits, sessions, and a secure purchase path. The Acuity scheduling and payment flow is reviewed separately once access is provided.' },\n    { n:'00', name:'Parallel & blocking', kind:'Verify with JP', intro:'Handled alongside the phases. These unblock and confirm the rest of the work.', fixes:['F-05'], outcome:'The System folder is unlocked and the remaining open items are confirmed with JP (Designation source, Google Sheet sync, and the decline and feedback field capture).' },\n  ];\n\n  openItems = [\n    { item:'Unlock the System automations folder', why:'The folder is locked and may contain the DND actions suppressing email. The audit cannot be completed without it.', tag:'Blocker' },\n    { item:'Confirm where Designation is populated', why:'It is blank for many contacts, and confirming its source clears the nurture-routing finding.', tag:'Linchpin' },\n    { item:'Confirm the Google Sheet trainer sync ([801.06])', why:'A missing row causes a silent match failure for that trainer.', tag:'Integration' },\n    { item:'Verify decline reason and feedback rating capture', why:'To confirm whether the data is recoverable or simply not stored.', tag:'Data' },\n  ];\n\n  navData = [\n    { id:'summary', label:'Summary' },\n    { id:'map', label:'State map' },\n    { id:'findings', label:'Findings' },\n    { id:'matrix', label:'Priority' },\n    { id:'scorecard', label:'Scorecard' },\n    { id:'roadmap', label:'Roadmap' },\n    { id:'open', label:'Open items' },\n    { id:'next', label:'Next step' },\n  ];\n\n  sevRank = { Critical:0, High:1, Medium:2, Low:3 };\n  findingById(id){ return this.findings.find(f => f.id === id); }\n  journeyTag(j){\n    const label = j==='Both' ? 'Both journeys' : (j==='Client' ? 'Client intake' : 'Member intake');\n    return { label, bg:'rgba(31,78,56,0.07)', fg:'#475569' };\n  }\n\n  scrollToId(id){\n    const el = document.getElementById(id);\n    if(!el) return;\n    const y = el.getBoundingClientRect().top + window.pageYOffset - 72;\n    window.scrollTo({ top:y, behavior: this.reduce ? 'auto' : 'smooth' });\n  }\n\n  componentDidMount(){\n    this.reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    this._raf = [];\n    this._obs = [];\n    this._fallbacks = [];\n    this.setupCountups();\n    this.setupReveal();\n    this.setupScroll();\n    this.setupGauges();\n    this.setupScatter();\n  }\n  componentWillUnmount(){\n    if(this._scrollHandler) window.removeEventListener('scroll', this._scrollHandler);\n    (this._raf||[]).forEach(id => cancelAnimationFrame(id));\n    (this._obs||[]).forEach(o => o.disconnect());\n    (this._fallbacks||[]).forEach(id => clearTimeout(id));\n  }\n\n  inView(n){ const r=n.getBoundingClientRect(); const h=window.innerHeight||document.documentElement.clientHeight||800; return r.top < h && r.bottom > 0; }\n\n  setupCountups(){\n    if(this.reduce) return;\n    const nodes = Array.from(document.querySelectorAll('[data-countup]'));\n    const start = (n)=>{ if(n._done) return; n._done=true; n.textContent='0'; this.animateCount(n, parseFloat(n.getAttribute('data-countup'))); };\n    const io = new IntersectionObserver((entries)=>{\n      entries.forEach(e=>{ if(e.isIntersecting){ start(e.target)
